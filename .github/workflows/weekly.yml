name: Weekly Metrics

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm start
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Render public/chart.png
        run: node scripts/render-chart-png.js

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/metrics.json output/history.jsonl public/metrics.json public/history.jsonl public/chart.png 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: weekly metrics $(date -u +%Y-%m-%d)"
          git push
