<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Schema Ecosystem Metrics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-muted: #f9fafb;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --link: #1d4ed8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
    }

    .subtitle {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      max-width: 40rem;
    }

    .timestamp {
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: ui-monospace, monospace;
      padding: 0.35rem 0.6rem;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1rem;
    }

    .card .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .card .value {
      font-size: 1.35rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .section {
      margin-bottom: 1.75rem;
    }

    .section-head h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.65rem;
    }

    .panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1rem;
    }

    .history-wrap .hint {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      padding: 0.65rem 0.75rem;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .hint code {
      font-family: ui-monospace, monospace;
      font-size: 0.82em;
      background: #fff;
      padding: 0.1rem 0.35rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: #374151;
    }

    .history-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      align-items: stretch;
    }

    @media (min-width: 768px) {
      .history-grid {
        grid-template-columns: 1fr 1fr;
        gap: 1rem 1.25rem;
      }
    }

    .history-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .history-panel .chart-canvas-wrap {
      flex: 1;
      min-height: 168px;
      height: 168px;
    }

    .chart-canvas-wrap {
      position: relative;
      width: 100%;
    }

    .chart-subtitle {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 0.85rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      max-width: 32rem;
    }

    footer {
      margin-top: 2.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: left;
    }

    footer a {
      color: var(--link);
    }

    @media (max-width: 600px) {
      .wrap { padding: 1.25rem 1rem 2rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>JSON Schema ecosystem metrics</h1>
      <p class="subtitle">Weekly npm download counts and GitHub repositories with the <code style="font-family:ui-monospace;font-size:0.9em">json-schema</code> topic.</p>
      <p class="timestamp" id="timestamp"><span>Loading…</span></p>
    </header>

    <div class="cards" id="cards"></div>

    <section class="section">
      <div class="section-head">
        <h2>Snapshot</h2>
      </div>
      <div class="panel">
        <canvas id="barChart" height="260"></canvas>
      </div>
    </section>

    <section class="section history-wrap" id="historySection">
      <div class="section-head">
        <h2>History</h2>
      </div>
      <p class="hint">
        Time series chart image (generated in workflow): <code>chart.png</code>
      </p>
      <div style="margin-top: 8px; border: 1px solid var(--border); border-radius: 6px; padding: 10px;">
        <img
          id="historyImage"
          src="/public/chart.png"
          alt="Time series chart"
          style="width: 100%; height: auto; display: block;"
        />
      </div>
    </section>

    <div id="error" class="error" style="display:none"></div>

    <footer>
      Sources: <a href="https://api.npmjs.org/">npm downloads API</a> · <a href="https://docs.github.com/en/rest">GitHub REST API</a>
    </footer>
  </div>

  <script>
    const chartFont = { family: "system-ui, sans-serif", size: 11 };
    const chartGrid = "#e5e7eb";
    const chartText = "#4b5563";
    const tooltipBg = "#ffffff";
    const tooltipBorder = "#d1d5db";

    function formatValue(n) {
      if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
      if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
      return String(n);
    }

    async function load() {
      let data;
      try {
        const r = await fetch("/public/metrics.json");
        if (!r.ok) throw new Error(r.status + " " + r.statusText);
        data = await r.json();
      } catch (e) {
        document.getElementById("timestamp").innerHTML = "";
        document.getElementById("error").textContent =
          "Could not load metrics. Run npm run serve from the project root, then open this page.";
        document.getElementById("error").style.display = "block";
        return;
      }

      document.querySelector("#timestamp span").textContent =
        "Snapshot: " + new Date(data.timestamp).toUTCString();

      const byName = Object.fromEntries(data.metrics.map((m) => [m.name, m]));
      const ajv = byName.ajv_weekly_downloads;
      const jsonschema = byName.jsonschema_weekly_downloads;
      const github = byName.github_json_schema_topic_repos;

      if (!ajv || !jsonschema || !github) {
        document.getElementById("timestamp").innerHTML = "";
        document.getElementById("error").textContent =
          "Required metrics not found in metrics.json. Re-run the collector.";
        document.getElementById("error").style.display = "block";
        return;
      }
      if (
        typeof ajv.value !== "number" ||
        typeof jsonschema.value !== "number" ||
        typeof github.value !== "number"
      ) {
        document.getElementById("timestamp").innerHTML = "";
        document.getElementById("error").textContent =
          "metrics.json has invalid metric values.";
        document.getElementById("error").style.display = "block";
        return;
      }

      const cardsEl = document.getElementById("cards");
      cardsEl.innerHTML =
        '<div class="card"><div class="label">ajv (npm)</div><div class="value">' + formatValue(ajv.value) + '</div></div>' +
        '<div class="card"><div class="label">jsonschema (npm)</div><div class="value">' + formatValue(jsonschema.value) + '</div></div>' +
        '<div class="card"><div class="label">GitHub topic repos</div><div class="value">' + github.value.toLocaleString() + '</div></div>';

      const ctx = document.getElementById("barChart").getContext("2d");
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["ajv", "jsonschema", "GitHub repos"],
          datasets: [{
            label: "Count",
            data: [ajv.value, jsonschema.value, github.value],
            backgroundColor: ["#bae6fd", "#a7f3d0", "#fde68a"],
            borderColor: ["#0284c7", "#059669", "#b45309"],
            borderWidth: 1,
            borderRadius: 4,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: tooltipBg,
              borderColor: tooltipBorder,
              borderWidth: 1,
              titleColor: "#111827",
              bodyColor: "#374151",
              titleFont: chartFont,
              bodyFont: chartFont,
              padding: 10,
              callbacks: {
                label: (ctx) => " " + Number(ctx.raw).toLocaleString()
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: chartText, font: chartFont }
            },
            y: {
              border: { color: chartGrid },
              grid: { color: chartGrid },
              ticks: {
                color: chartText,
                font: chartFont,
                callback: function(v) {
                  return v >= 1e6 ? (v / 1e6) + "M" : v >= 1e3 ? (v / 1e3) + "K" : v;
                }
              }
            }
          }
        }
      });

      const img = document.getElementById("historyImage");
      img.addEventListener("error", () => {
        img.style.display = "none";
        const p = document.createElement("p");
        p.textContent = "Time-series image not available yet. Wait for the workflow to generate public/chart.png.";
        p.style.color = "#991b1b";
        document.getElementById("historySection").appendChild(p);
      });
    }
    load();
  </script>
</body>
</html>
